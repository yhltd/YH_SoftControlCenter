<!DOCTYPE html>
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>加密查询</title>
    <link rel="shortcut icon" href="#"/>

    <script type="text/javascript" src="../js/Jquery.js"></script>
    <script type="text/javascript" src="../js/jquerysession.js"></script>

    <link rel="stylesheet" href="../bootstrap-4.5.0-dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="../bootstrap-4.5.0-dist/icons/bootstrap-icons.css">
    <script type="text/javascript" src="../bootstrap-4.5.0-dist/js/bootstrap.min.js"></script>

    <!--bootstrap-table-->
    <link rel="stylesheet" href="../bootstrap-4.5.0-dist/css/bootstrap-table.css">
    <script type="text/javascript" src="../bootstrap-4.5.0-dist/js/bootstrap-table.js"></script>
    <script type="text/javascript" src="../bootstrap-4.5.0-dist/js/bootstrap-table-zh-CN.min.js"></script>
    <script type="text/javascript" src="../bootstrap-4.5.0-dist/js/colResizable-1.6.js"></script>
    <script type="text/javascript" src="../bootstrap-4.5.0-dist/js/bootstrap-table-resizable.js"></script>

    <link rel="stylesheet" href="../css/main.css">
    <script type="text/javascript" src="../js/main.js"></script>
    <script type="text/javascript" src="../js/controlQuery.js"></script>
</head>

<style>
    .checkbox-group {
        margin-bottom: 10px;
        padding: 10px;
        border: 1px solid #ddd;
        border-radius: 4px;
    }

    .checkbox-item {
        display: inline-block;
        margin-right: 20px;
        margin-bottom: 10px;
    }

    .checkbox-label {
        display: inline-flex;
        align-items: center;
        cursor: pointer;
        margin-bottom: 0;
        font-weight: normal;
    }

    .checkbox-label input[type="checkbox"] {
        margin-right: 5px;
        margin-top: 0;
        vertical-align: middle;
    }

    .checkbox-label span {
        vertical-align: middle;
    }

    #update-mark5 {
        margin-top: 10px;
    }
</style>

<body class="pt-2" style="width: 98%;margin-left: 2%">
<div class="top-toolbar row">
    <div class="col-md-3 mb-2">
        <input id="query" type="text" class="form-control" placeholder="公司名" autocomplete="off">
    </div>
    <div class="col-md-2 mb-2">
        <button id="select-btn" class="btn btn-primary">
            <i class="bi bi-search icon"></i>
            查询
        </button>
    </div>
</div>

<div id="table-toolbar">
    <div class="btn-group" role="group">
        <button id="refresh-btn" class="btn btn-primary">
            <i class="bi bi-arrow-clockwise icon"></i>
            刷新
        </button>
        <button id="update-btn" class="btn btn-primary">
            <i class="bi bi-pencil-square icon"></i>
            修改
        </button>
        <button id="delete-btn" class="btn btn-primary">
            <i class="bi bi-trash icon"></i>
            删除
        </button>
        <a class="btn btn-primary" style="color: white;padding-top: 8px">当前页：加密管理</a>
    </div>
</div>

<div class="table-div border-top">
    <table id="accountTable"></table>
</div>

<div id="delete-modal" class="modal fade" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title">提示</div>
            </div>
            <div id="delete-modal-body" class="modal-body">
                确定禁用吗？
            </div>
            <div class="border-top" style="padding: 15px;">
                <button id="delete-submit-btn" type="button" class="btn btn-primary">
                    <i class="bi bi-arrow-bar-up icon"></i>
                    确定
                </button>
                <button id="delete-close-btn" type="button" class="btn btn-primary left-margin">
                    <i class="bi bi-x-circle icon"></i>
                    取消
                </button>
            </div>
        </div>
    </div>
</div>

<div id="update-modal" class="modal fade" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title">编辑</div>
                <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                    <span aria-hidden="true">&times;</span>
                </button>
            </div>
            <div class="modal-body">
                <form id="update-form" class="needs-validation">
                    <div class="form-group">
                        <input id="id" name="id" type="hidden">
                    </div>
                    <div class="form-group">
                        <label for="update-name">公司名</label>
                        <input id="update-name" name="name" type="text" class="form-control" autocomplete="off" style="width:100%">
                    </div>
                    <div class="form-group">
                        <label for="update-starttime">开始时间</label>
                        <input id="update-starttime" name="starttime" type="date" class="form-control" autocomplete="off" style="width:100%">
                    </div>
                    <div class="form-group">
                        <label for="update-endtime">软件到期时间</label>
                        <input id="update-endtime" name="endtime" type="date" class="form-control" autocomplete="off" style="width:100%">
                    </div>
                    <div class="form-group">
                        <label for="update-mark1">买断</label>
                        <input id="update-mark1" name="mark1" type="text" class="form-control" data-required="1" autocomplete="off" style="width:100%">
                    </div>
                    <div class="form-group">
                        <label for="update-mark2">服务器到期时间</label>
                        <input id="update-mark2" name="mark2" type="date" class="form-control" data-required="1" autocomplete="off" style="width:100%">
                    </div>
                    <div class="form-group">
                        <label for="update-mark3">允许创建账号数量(格式：1,2,...,10)</label>
                        <input id="update-mark3" name="mark3" type="number" class="form-control" data-required="1" autocomplete="off" style="width:100%">
                    </div>
                    <div class="form-group">
                        <label for="update-mark4">存储空间(填入1024等倍数内容)</label>
                        <input id="update-mark4" name="mark4" type="text" class="form-control" autocomplete="off" style="width:100%">
                    </div>
                    <div class="form-group">
                        <label for="update-mark5">用户可使用系统及备注</label>
                        <div class="checkbox-group">
                            <h6>需要插入类型：$APP安卓|PC端|小程序$备注;数据备注位置可以放其他信息,修改时文本框中只保留备注信息</h6>

                            <div class="checkbox-item">
                                <label class="checkbox-label">
                                    <input type="checkbox" name="system_type" value="APP安卓" checked>
                                    <span>APP安卓</span>
                                </label>
                            </div>

                            <div class="checkbox-item">
                                <label class="checkbox-label">
                                    <input type="checkbox" name="system_type" value="PC端" checked>
                                    <span>PC端</span>
                                </label>
                            </div>

                            <div class="checkbox-item">
                                <label class="checkbox-label">
                                    <input type="checkbox" name="system_type" value="EXCEL" checked>
                                    <span>EXCEL</span>
                                </label>
                            </div>

                            <div class="checkbox-item">
                                <label class="checkbox-label">
                                    <input type="checkbox" name="system_type" value="小程序" checked>
                                    <span>小程序</span>
                                </label>
                            </div>
                        </div>
                        <input id="update-mark5" name="mark5" type="text" class="form-control" autocomplete="off" style="width:100%">
                    </div>
                </form>
            </div>
            <div class="border-top" style="padding: 15px;">
                <button id="update-submit-btn" type="button" class="btn btn-primary">
                    <i class="bi bi-arrow-bar-up icon"></i>
                    提交
                </button>
                <button id="update-close-btn" type="button" class="btn btn-primary left-margin">
                    <i class="bi bi-x-circle icon"></i>
                    关闭
                </button>
            </div>
        </div>
    </div>
</div>

</body>
</html>
